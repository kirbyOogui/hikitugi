<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>設定 | 引継書</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="settings-header">
      <a href="/">← ホームへ</a>
      <h1 id="settings-title">設定</h1>
    </div>

    <!-- 設定トップ: 項目一覧のみ表示。今後の設定項目もここに追加していく -->
    <section id="settings-menu" class="card settings-menu">
      <button type="button" class="settings-menu-item" data-target="panel-category">
        <span>カテゴリ管理</span>
        <span class="settings-menu-item__chevron">›</span>
      </button>
      <button type="button" class="settings-menu-item" data-target="panel-soldout-done">
        <span>売切商品 対応済み</span>
        <span class="settings-menu-item__chevron">›</span>
      </button>
      <button type="button" class="settings-menu-item" data-target="panel-lost-done">
        <span>忘れ物 対応済み</span>
        <span class="settings-menu-item__chevron">›</span>
      </button>
      <button type="button" class="settings-menu-item" data-target="panel-done">
        <span>対応済み一覧</span>
        <span class="settings-menu-item__chevron">›</span>
      </button>
      <button type="button" class="settings-menu-item" data-target="panel-display">
        <span>表示設定</span>
        <span class="settings-menu-item__chevron">›</span>
      </button>
    </section>

    <!-- カテゴリ管理パネル -->
    <section id="panel-category" class="settings-panel hidden">
      <section class="card">
        <h2 class="card__title">カテゴリ管理</h2>
        <div id="category-list"></div>

        <form id="category-add-form" class="form-group" style="margin-top: 12px; display: flex; gap: 8px;">
          <input type="text" id="category-add-input" placeholder="新しいカテゴリ名" required style="flex: 1; border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 15px;" />
          <button type="submit" class="btn btn-primary">追加</button>
        </form>
      </section>
    </section>

    <!-- 対応済み一覧パネル -->
    <section id="panel-done" class="settings-panel hidden">
      <section class="card">
        <h2 class="card__title">対応済み一覧</h2>
        <div id="done-list"></div>
      </section>
    </section>

    <!-- 表示設定パネル -->
    <section id="panel-display" class="settings-panel hidden">
      <section class="card">
        <h2 class="card__title">表示設定</h2>
        <form id="display-settings-form" class="form-group" style="display: flex; align-items: center; gap: 8px;">
          <label for="new-badge-days">「NEW」を表示する日数</label>
          <input type="number" id="new-badge-days" min="0" max="30" required style="width: 64px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 15px;" />
          <button type="submit" class="btn btn-primary">保存</button>
        </form>
      </section>
    </section>

    <!-- 売切商品 対応済み一覧パネル -->
    <section id="panel-soldout-done" class="settings-panel hidden">
      <section class="card">
        <h2 class="card__title">売切商品 対応済み</h2>
        <div id="soldout-done-list"></div>
      </section>
    </section>

    <!-- 忘れ物 対応済み一覧パネル -->
    <section id="panel-lost-done" class="settings-panel hidden">
      <section class="card">
        <h2 class="card__title">忘れ物 対応済み</h2>
        <div id="lost-done-list"></div>
      </section>
    </section>
  </div>

  <!-- SortableJS: カテゴリのドラッグ&ドロップ並び替えに使用 -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/settings.js"></script>
</body>
</html>
