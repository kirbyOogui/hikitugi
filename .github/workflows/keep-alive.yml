name: Keep Neon DB awake

on:
  schedule:
    # Neonの無料プランは一定時間アクセスが無いとDBがスリープするため、10分おきにアクセスして防ぐ
    # (Cloud Run自体はコールドスタートが速いのでpingしなくても問題ないが、DBが眠っていると
    #  初回クエリだけ遅くなるため、DBに触れるAPIを叩いてこちらのスリープを防ぐ)
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app (DBに触れるAPIを叩いてNeonのスリープを防ぐ)
        run: curl -fsS --max-time 60 https://hikitugi-558401250018.asia-southeast1.run.app/api/handovers -o /dev/null
